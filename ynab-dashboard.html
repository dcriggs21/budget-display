<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Display</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --surface: #141414;
    --border: #2a2a2a;
    --border2: #383838;
    --text: #c8c8c8;
    --muted: #888;
    --dim: #555;
    --vdim: #222;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --accent: #5DCAA5;
    --digit: 'Share Tech Mono', monospace;
    --body: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }

  /* ── screens ── */
  #screen-token { min-height: 100vh; display: none; align-items: center; justify-content: center; padding: 2rem; }
  #screen-token.active { display: flex; }
  #spinner { min-height: 100vh; display: none; align-items: center; justify-content: center; }
  #spinner.active { display: flex; }
  #screen-picker { min-height: 100vh; display: none; padding: 2rem; }
  #screen-picker.active { display: block; }
  #screen-dash { display: none; min-height: 100vh; padding: 40px 36px 56px; max-width: 640px; margin: 0 auto; }
  #screen-dash.active { display: block; }

  /* ── token screen ── */
  .token-box { width: 100%; max-width: 400px; }
  .logo { font-family: var(--digit); font-size: 12px; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 2.5rem; }
  .logo span { color: var(--accent); }
  .big-title { font-family: var(--digit); font-size: 26px; font-weight: 400; color: var(--text); margin-bottom: 10px; line-height: 1.3; letter-spacing: 0.04em; }
  .sub { font-size: 15px; color: var(--muted); margin-bottom: 2.5rem; line-height: 1.7; font-family: var(--body); }
  .field-label { font-family: var(--digit); font-size: 10px; letter-spacing: 0.14em; color: var(--muted); display: block; margin-bottom: 8px; }
  input[type=password], select {
    width: 100%; background: var(--surface); border: 0.5px solid var(--border2);
    border-radius: 5px; padding: 11px 14px; font-size: 14px;
    font-family: var(--digit); color: var(--text); outline: none;
    transition: border-color 0.2s; margin-bottom: 14px;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--dim); }
  .btn-primary {
    width: 100%; background: var(--accent); border: none; border-radius: 5px;
    padding: 12px; font-size: 13px; font-family: var(--digit);
    color: #0a2e22; cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.08em;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .err { font-size: 12px; color: var(--red); margin-top: 10px; display: none; font-family: var(--digit); }
  .hint { font-family: var(--digit); font-size: 11px; color: var(--dim); margin-top: 18px; line-height: 1.8; }

  /* ── spinner ── */
  .spinner { width: 20px; height: 20px; border: 1px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── picker ── */
  .picker-wrap { max-width: 460px; margin: 0 auto; padding-top: 2rem; }
  .picker-title { font-family: var(--digit); font-size: 20px; font-weight: 400; margin-bottom: 6px; letter-spacing: 0.06em; color: var(--text); }
  .picker-sub { font-size: 14px; color: var(--muted); margin-bottom: 2rem; line-height: 1.7; }
  .picker-group { margin-bottom: 24px; }
  .picker-group-name { font-family: var(--digit); font-size: 10px; letter-spacing: 0.16em; color: var(--dim); margin-bottom: 8px; }
  .picker-item { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 0.5px solid var(--vdim); cursor: pointer; }
  .picker-item:last-child { border-bottom: none; }
  .check-box { width: 15px; height: 15px; border: 0.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
  .check-box.checked { background: var(--accent); border-color: var(--accent); }
  .check-box.checked::after { content: ''; display: block; width: 3px; height: 6px; border: 1.5px solid #0a2e22; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
  .picker-name { font-size: 15px; color: var(--muted); transition: color 0.15s; font-family: var(--body); }
  .picker-item:hover .picker-name { color: var(--text); }
  .picker-footer { display: flex; gap: 10px; margin-top: 2rem; padding-top: 1.5rem; border-top: 0.5px solid var(--border); }
  .btn-secondary { flex: 1; background: transparent; border: 0.5px solid var(--border2); border-radius: 5px; padding: 11px; font-size: 12px; font-family: var(--digit); color: var(--muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; letter-spacing: 0.08em; }
  .btn-secondary:hover { border-color: var(--muted); color: var(--text); }
  .btn-save { flex: 2; }

  /* ── dashboard ── */
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 0.5px solid var(--border); }
  .dash-month { font-family: var(--digit); font-size: 13px; letter-spacing: 0.16em; color: var(--muted); }
  .dash-right { text-align: right; }
  .live-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-right: 6px; animation: pulse 2.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  .live-txt { font-family: var(--digit); font-size: 10px; color: var(--dim); letter-spacing: 0.14em; }
  .dash-updated { font-family: var(--digit); font-size: 10px; color: var(--dim); margin-top: 4px; }

  .dash-group { margin-bottom: 36px; }
  .dash-group-name { font-family: var(--digit); font-size: 10px; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 14px; }
  .cat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 13px 0; border-bottom: 0.5px solid var(--vdim); }
  .cat-row:last-child { border-bottom: none; }
  .cat-name { font-family: var(--body); font-size: 17px; font-weight: 400; color: var(--muted); letter-spacing: 0.02em; }
  .cat-bal { font-family: var(--digit); font-size: 26px; letter-spacing: 0.04em; color: var(--text); }
  .cat-bal.low { color: var(--yellow); }
  .cat-bal.neg { color: var(--red); }
  .cat-bal.zero { color: var(--dim); }

  .dash-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 20px; border-top: 0.5px solid var(--border); }
  .btn-ghost { background: transparent; border: 0.5px solid var(--border); border-radius: 4px; padding: 6px 14px; font-size: 10px; font-family: var(--digit); color: var(--dim); cursor: pointer; letter-spacing: 0.1em; transition: color 0.2s, border-color 0.2s; }
  .btn-ghost:hover { color: var(--muted); border-color: var(--border2); }
</style>
</head>
<body>

<!-- Token screen -->
<div id="screen-token" class="active">
  <div class="token-box">
    <div class="logo">BUDGET <span>DISPLAY</span></div>
    <h1 class="big-title">Your budget,<br>always visible.</h1>
    <p class="sub">Connect your YNAB account and choose exactly which categories to show.</p>
    <label class="field-label">PERSONAL ACCESS TOKEN</label>
    <input type="password" id="token-input" placeholder="Paste your YNAB token..." autocomplete="off" />
    <div id="budget-wrap" style="display:none;">
      <label class="field-label">SELECT BUDGET</label>
      <select id="budget-select"></select>
    </div>
    <button class="btn-primary" id="connect-btn" onclick="handleConnect()">CONNECT TO YNAB</button>
    <div class="err" id="err-msg"></div>
    <p class="hint">app.ynab.com → Account Settings → Developer Settings → New Token</p>
  </div>
</div>

<!-- Spinner -->
<div id="spinner">
  <div class="spinner"></div>
</div>

<!-- Category picker -->
<div id="screen-picker">
  <div class="picker-wrap">
    <h2 class="picker-title">CHOOSE CATEGORIES</h2>
    <p class="picker-sub">Select which categories appear on your display. Change anytime.</p>
    <div id="picker-list"></div>
    <div class="picker-footer">
      <button class="btn-secondary" onclick="selectAll()">SELECT ALL</button>
      <button class="btn-primary btn-save" onclick="savePicks()">SHOW DASHBOARD</button>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="screen-dash">
  <div class="dash-header">
    <div class="dash-month" id="dash-month"></div>
    <div class="dash-right">
      <div><span class="live-dot"></span><span class="live-txt">LIVE</span></div>
      <div class="dash-updated" id="dash-updated"></div>
    </div>
  </div>
  <div id="dash-cats"></div>
  <div class="dash-footer">
    <button class="btn-ghost" onclick="loadData()">REFRESH</button>
    <button class="btn-ghost" onclick="goToPicker()">EDIT CATEGORIES</button>
    <button class="btn-ghost" onclick="logout()">DISCONNECT</button>
  </div>
</div>

<script>
const BASE = 'https://api.ynab.com/v1';
let token = '', budgetId = '';
let allCategories = [];
let selectedIds = new Set();
let refreshTimer = null;
const REFRESH_MS = 30 * 60 * 1000;

function show(id) {
  ['screen-token','screen-picker','screen-dash','spinner'].forEach(s => {
    document.getElementById(s).classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function fmt(mu) {
  const v = mu / 1000;
  const abs = Math.abs(v);
  return (v < 0 ? '-$' : '$') + abs.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function balClass(mu, budgeted) {
  if (mu === 0 && budgeted === 0) return 'zero';
  if (mu < 0) return 'neg';
  if (budgeted > 0 && (mu / budgeted) <= 0.2) return 'low';
  return '';
}

async function api(path) {
  const r = await fetch(BASE + path, { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e?.error?.detail || 'Error ' + r.status); }
  return r.json();
}

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg; el.style.display = 'block';
}

async function handleConnect() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) { showErr('Please enter your token.'); return; }
  token = t;
  document.getElementById('err-msg').style.display = 'none';
  const btn = document.getElementById('connect-btn');
  btn.disabled = true; btn.textContent = 'CONNECTING...';
  try {
    const data = await api('/budgets?include_accounts=false');
    const budgets = data.data.budgets;
    if (!budgets.length) throw new Error('No budgets found.');
    if (budgets.length === 1) {
      budgetId = budgets[0].id;
      await loadCategoriesForPicker();
    } else {
      const sel = document.getElementById('budget-select');
      sel.innerHTML = budgets.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
      budgetId = budgets[0].id;
      sel.onchange = () => { budgetId = sel.value; };
      document.getElementById('budget-wrap').style.display = 'block';
      btn.textContent = 'CONTINUE'; btn.disabled = false;
      btn.onclick = loadCategoriesForPicker;
    }
  } catch(e) {
    showErr(e.message);
    btn.disabled = false; btn.textContent = 'CONNECT TO YNAB';
  }
}

async function loadCategoriesForPicker() {
  show('spinner');
  try {
    const data = await api(`/budgets/${budgetId}/months/current`);
    allCategories = (data.data.month.categories || []).filter(c => !c.hidden && !c.deleted);
    selectedIds = new Set(allCategories.map(c => c.id));
    renderPicker();
    show('screen-picker');
  } catch(e) {
    show('screen-token');
    showErr(e.message);
  }
}

function stripEmoji(str) {
  return str.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FEFF}]/gu, '').trim();
}

function renderPicker() {
  const groups = {};
  allCategories.forEach(c => {
    const g = stripEmoji(c.category_group_name || 'Other');
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });
  const list = document.getElementById('picker-list');
  list.innerHTML = '';
  Object.entries(groups).forEach(([gname, cats]) => {
    const sec = document.createElement('div');
    sec.className = 'picker-group';
    sec.innerHTML = `<div class="picker-group-name">${gname}</div>`;
    cats.forEach(c => {
      const cleanName = stripEmoji(c.name);
      const row = document.createElement('div');
      row.className = 'picker-item';
      const checked = selectedIds.has(c.id);
      row.innerHTML = `<div class="check-box ${checked ? 'checked' : ''}" data-id="${c.id}"></div><span class="picker-name">${cleanName}</span>`;
      row.onclick = () => {
        const box = row.querySelector('.check-box');
        if (selectedIds.has(c.id)) { selectedIds.delete(c.id); box.classList.remove('checked'); }
        else { selectedIds.add(c.id); box.classList.add('checked'); }
      };
      sec.appendChild(row);
    });
    list.appendChild(sec);
  });
}

function selectAll() {
  allCategories.forEach(c => selectedIds.add(c.id));
  renderPicker();
}

async function savePicks() {
  if (!selectedIds.size) { alert('Pick at least one category.'); return; }
  show('spinner');
  await loadData();
  show('screen-dash');
  scheduleRefresh();
}

async function loadData() {
  try {
    const data = await api(`/budgets/${budgetId}/months/current`);
    renderDash(data.data.month);
  } catch(e) { console.error(e); }
}

function renderDash(month) {
  const d = new Date(month.month + 'T12:00:00');
  document.getElementById('dash-month').textContent =
    d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }).toUpperCase();
  document.getElementById('dash-updated').textContent =
    new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  const cats = (month.categories || []).filter(c => !c.hidden && !c.deleted && selectedIds.has(c.id));
  const groups = {};
  cats.forEach(c => {
    const g = stripEmoji(c.category_group_name || 'Other');
    if (!groups[g]) groups[g] = [];
    groups[g].push(c);
  });

  const container = document.getElementById('dash-cats');
  container.innerHTML = '';
  Object.entries(groups).forEach(([gname, gcats]) => {
    const sec = document.createElement('div');
    sec.className = 'dash-group';
    sec.innerHTML = `<div class="dash-group-name">${gname}</div>`;
    gcats.forEach(c => {
      const row = document.createElement('div');
      row.className = 'cat-row';
      row.innerHTML = `
        <span class="cat-name">${stripEmoji(c.name)}</span>
        <span class="cat-bal ${balClass(c.balance, c.budgeted)}">${fmt(c.balance)}</span>
      `;
      sec.appendChild(row);
    });
    container.appendChild(sec);
  });
}

function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(loadData, REFRESH_MS);
}

function goToPicker() {
  if (refreshTimer) clearInterval(refreshTimer);
  renderPicker();
  show('screen-picker');
}

function logout() {
  token = ''; budgetId = '';
  if (refreshTimer) clearInterval(refreshTimer);
  document.getElementById('token-input').value = '';
  const btn = document.getElementById('connect-btn');
  btn.textContent = 'CONNECT TO YNAB'; btn.disabled = false; btn.onclick = handleConnect;
  document.getElementById('budget-wrap').style.display = 'none';
  document.getElementById('err-msg').style.display = 'none';
  show('screen-token');
}
</script>
</body>
</html>
